name: Build kcehcgis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Compile kcehcgis Binary
      run: |
        cl.exe /EHsc /O2 /Fe:kcehcgis.exe kcehcgis.cpp crypt32.lib wintrust.lib
        
    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kcehcgis-build-amd64
        path: kcehcgis.exe
